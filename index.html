
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Geometry Dash</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
    }

    canvas {
        background: #111;
        display: block;
        margin: 20px auto;
        border: 3px solid #00e5ff;
        border-radius: 10px;
    }

    #ui {
        position: absolute;
        width: 100%;
        top: 0;
        left: 0;
    }

    .screen {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.85);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px #00e5ff;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        background: #00e5ff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover {
        background: #00bcd4;
    }

    #score {
        font-size: 20px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div id="ui">
    <div id="startScreen" class="screen">
        <h1>Geometry Dash Lite</h1>
        <p>Press <b>SPACE</b> to jump.</p>
        <p>Avoid obstacles and survive as long as possible!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="gameOverScreen" class="screen" style="display:none;">
        <h1>Game Over</h1>
        <p id="finalScore"></p>
        <button onclick="restartGame()">Restart</button>
    </div>

    <div id="score" style="display:none;">Score: 0</div>
</div>

<canvas id="gameCanvas" width="600" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player, obstacles, gravity, gameRunning, score;

function init() {
    player = { x: 50, y: 250, size: 20, dy: 0 };
    obstacles = [];
    gravity = 0.6;
    gameRunning = false;
    score = 0;
}

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("score").style.display = "block";
    init();
    gameRunning = true;
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    document.getElementById("gameOverScreen").style.display = "none";
    document.getElementById("score").style.display = "block";
    init();
    gameRunning = true;
    requestAnimationFrame(gameLoop);
}

// Single interaction: SPACEBAR
document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        if (gameRunning && player.y >= 250) {
            player.dy = -10;
        }
    }
});

function spawnObstacle() {
    obstacles.push({
        x: canvas.width,
        y: 260,
        width: 20,
        height: 40
    });
}

function update() {
    // Player physics
    player.dy += gravity;
    player.y += player.dy;

    if (player.y > 250) {
        player.y = 250;
        player.dy = 0;
    }

    // Obstacles
    if (Math.random() < 0.02) {
        spawnObstacle();
    }

    for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].x -= 4;

        // Collision
        if (
            player.x < obstacles[i].x + obstacles[i].width &&
            player.x + player.size > obstacles[i].x &&
            player.y < obstacles[i].y + obstacles[i].height &&
            player.y + player.size > obstacles[i].y
        ) {
            gameOver();
        }
    }

    // Remove off-screen obstacles
    obstacles = obstacles.filter(o => o.x > -20);

    // Score update
    score++;
    document.getElementById("score").innerText = "Score: " + score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ground
    ctx.fillStyle = "#00e5ff";
    ctx.fillRect(0, 280, canvas.width, 20);

    // Player
    ctx.fillStyle = "#ff4081";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // Obstacles
    ctx.fillStyle = "#ffeb3b";
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.width, o.height);
    });
}

function gameLoop() {
    if (!gameRunning) return;

    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    document.getElementById("score").style.display = "none";
    document.getElementById("gameOverScreen").style.display = "block";
    document.getElementById("finalScore").innerText = "Final Score: " + score;
}

// Initialize
init();
</script>

</body>
</html>
