
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Geometry Dash</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
  }

  canvas {
    display: block;
    margin: 20px auto;
    background: #111;
    border: 3px solid #00ffff;
    box-shadow: 0 0 20px #00ffff;
  }

  #menu, #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  h1 {
    color: #00ffff;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

<div id="menu">
  <h1>Geometry Dash Lite</h1>
  <p>Press SPACE to jump</p>
  <p>Hold SPACE for higher jumps</p>
  <p>Avoid obstacles</p>
  <p>Press SPACE to start</p>
</div>

<div id="gameOver" class="hidden">
  <h1>Game Over</h1>
  <p id="finalScore"></p>
  <p>Press SPACE to restart</p>
</div>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "menu";
let player, obstacles, gravity, velocityY;
let isHolding = false;
let score = 0;
let speed = 5;
let level = 1;

// Sound effects
const jumpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const crashSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function resetGame() {
  player = { x: 100, y: 200, size: 20 };
  obstacles = [];
  velocityY = 0;
  gravity = 0.6;
  score = 0;
  speed = 5;
  level = 1;
}

function spawnObstacle() {
  obstacles.push({
    x: canvas.width,
    y: 220,
    width: 20,
    height: 40
  });
}

function update() {
  if (gameState !== "playing") return;

  // Player physics
  if (isHolding) {
    velocityY -= 0.4;
  }

  velocityY += gravity;
  player.y += velocityY;

  // Ground collision
  if (player.y > 200) {
    player.y = 200;
    velocityY = 0;
  }

  // Obstacles
  if (Math.random() < 0.02) spawnObstacle();

  obstacles.forEach(o => o.x -= speed);

  // Collision
  obstacles.forEach(o => {
    if (
      player.x < o.x + o.width &&
      player.x + player.size > o.x &&
      player.y < o.y + o.height &&
      player.y + player.size > o.y
    ) {
      crashSound.play();
      gameState = "gameover";
      document.getElementById("gameOver").classList.remove("hidden");
      document.getElementById("finalScore").innerText = "Score: " + Math.floor(score);
    }
  });

  obstacles = obstacles.filter(o => o.x > -20);

  // Score & level
  score += 0.1;

  if (score > level * 100) {
    level++;
    speed += 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "#00ffff";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Obstacles
  ctx.fillStyle = "#ff004c";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));

  // Ground
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 240, canvas.width, 2);

  // Score
  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + Math.floor(score), 10, 30);
  ctx.fillText("Level: " + level, 10, 55);
}

function gameLoop() {
  update();
  if (gameState === "playing") draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") {
    if (gameState === "menu") {
      gameState = "playing";
      document.getElementById("menu").classList.add("hidden");
      resetGame();
    } else if (gameState === "playing") {
      if (player.y >= 200) {
        velocityY = -10;
        jumpSound.play();
      }
      isHolding = true;
    } else if (gameState === "gameover") {
      document.getElementById("gameOver").classList.add("hidden");
      resetGame();
      gameState = "playing";
    }
  }
});

document.addEventListener("keyup", e => {
  if (e.code === "Space") {
    isHolding = false;
  }
});

resetGame();
gameLoop();
</script>

</body>
</html>
